<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>MakeDreamHomes</title>

		<base href="/" />

		<!-- App is light-only. Declaring `light` stops the WebView painting a
		     black background on dark-mode devices before the CSS bundle loads. -->
		<meta name="color-scheme" content="light" />
		<meta
			name="viewport"
			content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>

		<!-- Paint the app's own background on the very first frame — before the
		     JS/CSS bundle loads — so there's no black/blank/white flash between
		     the native splash and the app's first render. Matches
		     `--ion-background-color` so the splash hand-off has no colour jump. -->
		<style>
			html,
			body,
			#root {
				background-color: #f4f6fb;
			}
		</style>
		<meta name="format-detection" content="telephone=no" />
		<meta name="msapplication-tap-highlight" content="no" />

		<link rel="manifest" href="/manifest.json" />

		<link rel="shortcut icon" type="image/png" href="/favicon.png" />

		<!-- add to homescreen for ios -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="MakeDreamHomes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
