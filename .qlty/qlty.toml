config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
  # Project-specific exclusions (Ionic React + Vite + Capacitor)
  "**/public/**",
  "**/coverage/**",        # test coverage output
  "**/android/**",         # Capacitor native Android project
  "**/ios/**",             # Capacitor native iOS project
  "**/.husky/**",
  "**/.vscode/**",
  "**/.qlty/**",           # qlty's own scaffolded tool-configs
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
  "**/*.cy.*",            # Cypress e2e specs
]

# Maintainability — complexity + duplication. Advisory (comment): surfaced in
# `qlty check`/PRs, does NOT block commits. Thresholds below follow recognized
# static-analysis standards (Code Climate lineage + SonarQube cognitive
# complexity). qlty has no raw "functions-per-file" check; file_complexity is
# the file-level proxy ("this file does too much"). Tune any value as the team
# calibrates against real scores.
[smells]
mode = "comment"

# Cognitive complexity of a single function (SonarQube default = 15).
[smells.function_complexity]
threshold = 15

# Total complexity accumulated across a whole file.
[smells.file_complexity]
threshold = 100

# Max nesting depth of control flow — if/for/while/try (ESLint max-depth = 4).
[smells.nested_control_flow]
threshold = 4

# Max parameters per function (Code Climate default = 4).
[smells.function_parameters]
threshold = 4

# Max return statements per function (Code Climate default = 4).
[smells.return_statements]
threshold = 4

# Max boolean operators in one expression (Code Climate default = 4).
[smells.boolean_logic]
threshold = 4

# Duplicate code: minimum block size (AST nodes) before it's flagged. Lower is
# more sensitive; 50 is qlty's default.
[smells.duplication]
nodes_threshold = 50

[[source]]
name = "default"
default = true

# --- Linters / formatters --------------------------------------------------

# JavaScript/TypeScript/React linting (correctness, react-hooks, type-safety,
# prettier rule via eslint-plugin-prettier). Version MUST match the repo's
# installed ESLint (flat config: typescript-eslint + react-hooks/react-refresh).
[[plugin]]
name = "eslint"
version = "9.39.5"
package_file = "package.json"
package_filters = [
  "eslint",
  "@eslint/js",
  "typescript-eslint",
  "eslint-plugin-react-hooks",
  "eslint-plugin-react-refresh",
  "eslint-config-prettier",
  "eslint-plugin-prettier",
  "prettier",
  "globals",
  "typescript",
]

# Code formatting. Version matches the repo's installed prettier.
[[plugin]]
name = "prettier"
version = "3.9.5"
package_file = "package.json"
package_filters = ["prettier"]

# Secret detection — git-aware, fast (primary pre-commit secret scanner).
[[plugin]]
name = "gitleaks"

# Secret detection — verified secrets (complements gitleaks; catches live creds).
[[plugin]]
name = "trufflehog"

# Dependency vulnerability scanning (OSV database). MONITOR: surfaces CVEs in
# `qlty check`/CI without blocking commits — a new advisory shouldn't block an
# unrelated commit, and a fix may not exist yet. Enforce in CI instead.
[[plugin]]
name = "osv-scanner"
mode = "monitor"

# SAST (static security analysis) using the curated rules in .semgrep.yaml.
# Advisory (comment): surfaces findings without blocking. Flip to blocking
# (remove `mode`) once the codebase is clean of its findings.
[[plugin]]
name = "semgrep"
mode = "comment"

# Filesystem/image/IaC vuln scanning. Disabled: overlaps osv-scanner (deps);
# better suited to CI image scanning.
[[plugin]]
name = "trivy"
mode = "disabled"

# Dockerfile security linting (no-op until a Dockerfile is added).
[[plugin]]
name = "hadolint"

# Dockerfile formatting (no-op until a Dockerfile is added).
[[plugin]]
name = "dockerfmt"

# Shell-script correctness (incl. the git hook).
[[plugin]]
name = "shellcheck"

# YAML linting (configs, CI workflows).
[[plugin]]
name = "yamllint"

# Dead-code detection: unused files, exports, and dependencies (TS). Advisory
# (comment) — driven by knip.json, which marks the Vite/Ionic entry points
# (src/main.tsx, vite/cypress configs) so they aren't false "unused" hits. Tune
# knip.json (ignoreDependencies/ignore) as needed.
[[plugin]]
name = "knip"
mode = "comment"

# Markdown style. Disabled for now (docs-only); enable as `comment` when ready.
[[plugin]]
name = "markdownlint"
mode = "disabled"

# Flags TODO/FIXME markers. Advisory (comment), does not block.
[[plugin]]
name = "ripgrep"
mode = "comment"
